name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below so we can reproduce and fix the issue.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submission checklist
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true
        - label: I verified this happens with the latest version
          required: true
        - label: I can reproduce this bug consistently
          required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: "Describe what happened and what you expected to happen..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Install aipass v2.x.x
        2. Run `aipass ...`
        3. Observe error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened instead?

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproducible Example
      description: Provide the smallest amount of code that reproduces the bug.
      placeholder: |
        from aipass import ...

        # minimal code to trigger the bug
      render: python

  - type: textarea
    id: error
    attributes:
      label: Full Error Output / Stack Trace
      description: Copy the complete error output, including the full stack trace.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Your environment details.
      placeholder: |
        - Python: 3.12.0
        - OS: Ubuntu 24.04
        - aipass: 2.1.69
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Anything else we should know? Screenshots, logs, related issues, etc.
